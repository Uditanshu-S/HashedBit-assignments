<!DOCTYPE html>
<html>
<head>
    <title>JS Interactive Assignment</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }
        input, button {
            margin: 5px;
            padding: 8px;
        }
        .box {
            border: 1px solid gray;
            padding: 15px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<h2>JavaScript Interactive Assignment</h2>

<!-- 1. Even Numbers -->
<div class="box">
    <h3>1. Even Numbers</h3>
    <button onclick="showEven()">Show Even Numbers</button>
    <p id="evenOutput"></p>
</div>

<!-- 2. Calculator -->
<div class="box">
    <h3>2. Calculator</h3>
    <input type="number" id="num1" placeholder="Enter first number">
    <input type="number" id="num2" placeholder="Enter second number">
    <input type="text" id="operator" placeholder="+ - * /">
    <button onclick="calculate()">Calculate</button>
    <p id="calcOutput"></p>
</div>

<!-- 3. Tax -->
<div class="box">
    <h3>3. Tax Calculator</h3>
    <input type="number" id="salary" placeholder="Enter salary">
    <button onclick="findTax()">Calculate Tax</button>
    <p id="taxOutput"></p>
</div>

<!-- 4. Sum of Products -->
<div class="box">
    <h3>4. Sum of Products</h3>
    <input type="number" id="n1" placeholder="Enter first number">
    <input type="number" id="n2" placeholder="Enter second number">
    <button onclick="sumProducts()">Calculate</button>
    <p id="prodOutput"></p>
</div>

<script src="script_1.js"></script>

</body>
</html>
